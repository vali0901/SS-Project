name: ESP32-CAM CI Pipeline
 
# Declanșare la push sau pull request pe branch-ul main
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # =============================================
  # Job 1: Compilarea firmware-ului ESP32
  # =============================================
  build-firmware:
    name: Build ESP32 Firmware
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Firmware (ESP32-CAM AI-Thinker)
        run: pio run -e esp32cam
 
      # Salvăm firmware.bin ca artifact descărcabil
      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32cam
          path: .pio/build/esp32cam/firmware.bin
      
      - name: Create Github Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: .pio/build/esp32cam/firmware.bin
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
  # =============================================
  # Job 2: Analiza statică C++ (Firmware)
  # =============================================
  analyze-firmware:
    name: Static Analysis (C++)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all \
                   --inconclusive \
                   --std=c++11 \
                   -I include/ \
                   --suppress=missingIncludeSystem \
                   --suppress=missingInclude \
                   --suppress=unusedFunction \
                   --suppress=cstyleCast \
                   --error-exitcode=1 \
                   src/

  # =============================================
  # Job 3: Verificarea codului Python (Receiver)
  # =============================================
  check-python:
    name: Python Lint & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pylint bandit
          # opencv-python-headless se folosește în CI (fără display)
          pip install paho-mqtt opencv-python-headless numpy

      - name: Lint with Pylint
        # || true = soft-fail, pipeline-ul nu eșuează pe warning-uri pylint
        run: pylint --disable=C0114,C0115,C0116,C0103 receiver.py || true

      - name: Security scan with Bandit
        run: bandit receiver.py -ll

  # =============================================
  # Job 4: Verificare de sintaxa Python (Receiver)
  # =============================================
  check-syntax-python:
    name: Python Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pylint bandit
          # opencv-python-headless se folosește în CI (fără display)
          pip install paho-mqtt opencv-python-headless numpy

      - name: Smoke test
        run: python -m py_compile receiver.py

  # =============================================
  # Job 5: Fuzzing Python Code
  # =============================================
  fuzz-python:
    name: Python Fuzzing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install atheris opencv-python-headless numpy paho-mqtt

      - name: Create fuzz target
        run: |
          cat > fuzz_receiver.py << 'EOF'
          import atheris
          import sys
          import cv2
          import numpy as np

          # Simulated image decode function extracted from receiver.py
          def process_image_data(data: bytes):
              """Fuzz target for image processing logic."""
              try:
                  nparr = np.frombuffer(data, np.uint8)
                  img = cv2.imdecode(nparr, cv2.IMREAD_COLOR)
                  return img is not None
              except Exception:
                  return False

          @atheris.instrument_func
          def test_one_input(data: bytes):
              """Atheris fuzz target."""
              process_image_data(data)

          if __name__ == "__main__":
              atheris.Setup(sys.argv, test_one_input)
              atheris.Fuzz()
          EOF

      - name: Run fuzzer
        run: |
          # Run fuzzer for 60 seconds with a timeout
          timeout 60 python fuzz_receiver.py -atheris_runs=10000 || true
        env:
          PYTHONDONTWRITEBYTECODE: 1
